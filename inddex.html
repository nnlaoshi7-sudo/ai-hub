<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI工具资源站</title>
  <style>
    body {
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background:#0f172a;
      color:#fff;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:40px 20px;
    }

    h1 {
      text-align:center;
      font-size:32px;
      margin-bottom:10px;
    }

    .sub {
      text-align:center;
      color:#94a3b8;
      margin-bottom:40px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:20px;
      transition:0.3s;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-5px);
      border-color:#3b82f6;
    }

    .title {
      font-size:18px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .desc {
      font-size:13px;
      color:#94a3b8;
      margin-bottom:15px;
    }

    .btn {
      display:block;
      text-align:center;
      padding:10px;
      border-radius:10px;
      text-decoration:none;
      background:#3b82f6;
      color:#fff;
      font-size:14px;
      transition:0.2s;
    }

    .btn:hover {
      background:#2563eb;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>AI工具资源站</h1>
  <div class="sub">精选AI工具 · 一键直达 · 高效变现</div>

  <div class="grid">

    <div class="card">
      <div class="title">ChatGPT</div>
      <div class="desc">AI对话 / 写作 / 编程</div>
      <a class="btn" href="https://chat.openai.com" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Gemini</div>
      <div class="desc">Google多模态AI</div>
      <a class="btn" href="https://gemini.google.com" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Claude</div>
      <div class="desc">长文本写作神器</div>
      <a class="btn" href="https://claude.ai" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Midjourney</div>
      <div class="desc">高质量AI绘图</div>
      <a class="btn" href="https://www.midjourney.com" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Runway</div>
      <div class="desc">AI视频生成</div>
      <a class="btn" href="https://runwayml.com" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">即梦AI</div>
      <div class="desc">短视频生成工具</div>
      <a class="btn" href="https://jimeng.jianying.com" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Perplexity</div>
      <div class="desc">AI搜索引擎</div>
      <a class="btn" href="https://www.perplexity.ai" target="_blank">立即进入</a>
    </div>

    <div class="card">
      <div class="title">Gamma</div>
      <div class="desc">AI生成PPT</div>
      <a class="btn" href="https://gamma.app" target="_blank">立即进入</a>
    </div>

  </div>

</div>

</body>
</html>
